version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: studyverse_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studyverse_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/studyverse
      - JWT_SECRET=studyversesupersecretjwtkey123!
      - GEMINI_API_KEY=placeholder_key
      - FRONTEND_URL=http://localhost:5173
      - CLOUDINARY_CLOUD_NAME=placeholder
      - CLOUDINARY_API_KEY=placeholder
      - CLOUDINARY_API_SECRET=placeholder
      - NODE_ENV=development
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: studyverse_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  mongodb_data:
